# Prediction Market Quant Bot -- Backtest Configuration
# =====================================================
# Copy this to backtest/config.yaml and fill in your keys.

mode: paper

polymarket:
  private_key: ""
  chain_id: 137
  funder_address: ""

kalshi:
  email: ""
  api_key: ""

telegram:
  bot_token: ""
  chat_id: ""
  require_confirm: true
  send_scan_summary: true

coinbase:
  price_cache_ttl: 30

research:
  scrapecreators_api_key: ""
  xai_api_key: ""
  brave_api_key: ""
  research_cache_ttl: 1800
  research_sources:
    - reddit
    - web
    - hackernews
    - x

strategy:
  min_ev_threshold: 0.05
  kelly_fraction: 0.25
  max_position_usd: 10.00
  scan_interval_sec: 120
  min_market_volume: 5000
  min_liquidity_depth: 50
  platforms:
    - kalshi

risk:
  max_daily_loss_usd: 20.00
  max_open_positions: 5
  max_consecutive_losses: 3
  max_portfolio_pct: 0.10
  bankroll_usd: 50.00
  cooldown_after_stop_min: 60
  min_market_liquidity: 10000
  max_spread_tolerance: 0.05

logging:
  trade_log: logs/trades.json
  performance_log: logs/performance.json
  verbose: true
